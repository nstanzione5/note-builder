<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Note Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-shell">
    <div class="top-ribbon">
      <div class="brand-wrap">
        <img
          src="./astra-logo.png"
          alt="Astra logo"
          class="astra-logo"
          onerror="this.style.display='none'; document.body.classList.add('logo-missing');"
        />
        <div class="brand-text">
          <div class="brand-title">Clinical Note Generator</div>
          <div class="brand-subtitle">Psychiatric documentation helper</div>
        </div>
      </div>

      <div class="ribbon-tools" aria-label="Clinical Tools">
        <a
          class="tool-icon-btn"
          href="https://www.mdcalc.com/calc/10091/benzodiazepine-conversion-calculator"
          target="_blank"
          rel="noopener noreferrer"
          data-tooltip="Benzo Calculator"
          aria-label="Open Benzo Calculator"
          title="Benzo Calculator"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3.5h8a2.5 2.5 0 0 1 2.5 2.5v12A2.5 2.5 0 0 1 16 20.5H8A2.5 2.5 0 0 1 5.5 18V6A2.5 2.5 0 0 1 8 3.5Zm0 1.5A1 1 0 0 0 7 6v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H8Zm1.25 3h5.5a.75.75 0 0 1 0 1.5h-5.5a.75.75 0 0 1 0-1.5Zm0 3.75h5.5a.75.75 0 0 1 0 1.5h-5.5a.75.75 0 0 1 0-1.5Zm0 3.75h3a.75.75 0 0 1 0 1.5h-3a.75.75 0 0 1 0-1.5Z"/>
          </svg>
        </a>

        <a
          class="tool-icon-btn"
          href="https://alpenglowbh.com/medication-calculator/"
          target="_blank"
          rel="noopener noreferrer"
          data-tooltip="Stimulant Calculator"
          aria-label="Open Stimulant Calculator"
          title="Stimulant Calculator"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.2 4.25a4.95 4.95 0 0 1 7 7l-1.4 1.4-7-7 1.4-1.4Zm-2.45 2.45 7 7-3.6 3.6a4.95 4.95 0 0 1-7-7l3.6-3.6Zm9.36.19a.75.75 0 0 1 1.06 0l.94.94a.75.75 0 1 1-1.06 1.06l-.94-.94a.75.75 0 0 1 0-1.06ZM5.8 16.1a.75.75 0 0 1 1.06 0l1.04 1.04a.75.75 0 1 1-1.06 1.06L5.8 17.16a.75.75 0 0 1 0-1.06Z"/>
          </svg>
        </a>

        <a
          class="tool-icon-btn"
          href="https://mhmeatnpotatoes.com/antidepressant-switching-tool"
          target="_blank"
          rel="noopener noreferrer"
          data-tooltip="Antidepressant Cross-Titration"
          aria-label="Open Antidepressant Cross-Titration Tool"
          title="Antidepressant Cross-Titration"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.25 4.5h9.5A2.25 2.25 0 0 1 19 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-9.5A2.25 2.25 0 0 1 5 17.25V6.75A2.25 2.25 0 0 1 7.25 4.5Zm0 1.5a.75.75 0 0 0-.75.75v10.5c0 .414.336.75.75.75h9.5a.75.75 0 0 0 .75-.75V6.75a.75.75 0 0 0-.75-.75h-9.5Zm1.5 3.25h6.5a.75.75 0 0 1 0 1.5h-6.5a.75.75 0 0 1 0-1.5Zm0 3.5h6.5a.75.75 0 0 1 0 1.5h-6.5a.75.75 0 0 1 0-1.5Z"/>
          </svg>
        </a>
      </div>
    </div>

    <div class="header-actions">
      <button id="copyBtn" class="action-btn action-btn-secondary" type="button">
        Copy Export
      </button>
      <button id="openGptBtn" class="action-btn action-btn-primary" type="button">
        Copy + Open GPT
      </button>
      <button id="openOnlyBtn" class="action-btn action-btn-ghost" type="button">
        Open GPT
      </button>
    </div>
  </header>

  <main class="app-shell">
    <section class="dashboard-card sticky-dashboard">
      <div class="dashboard-grid">
        <div class="dashboard-item">
          <div class="dashboard-label">Setup</div>
          <div class="dashboard-value" id="setupCompletion">0%</div>
        </div>
        <div class="dashboard-item">
          <div class="dashboard-label">Notes</div>
          <div class="dashboard-value" id="notesCompletion">0%</div>
        </div>
        <div class="dashboard-item">
          <div class="dashboard-label">Closing</div>
          <div class="dashboard-value" id="closingCompletion">0%</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Visit Setup</h2>
      </div>

      <div class="form-grid form-grid-2">
        <div class="field">
          <label>Practice</label>
          <div class="segmented" id="practiceToggle">
            <button type="button" class="segmented-btn active" data-group="practice" data-value="Astra">Astra</button>
            <button type="button" class="segmented-btn" data-group="practice" data-value="EBH">EBH</button>
          </div>
          <input type="hidden" id="practice" value="Astra" />
        </div>

        <div class="field">
          <label>Appointment Type</label>
          <div class="segmented" id="appointmentTypeToggle">
            <button type="button" class="segmented-btn active" data-group="appointmentType" data-value="Follow-up">Follow-up</button>
            <button type="button" class="segmented-btn" data-group="appointmentType" data-value="Intake">Intake</button>
          </div>
          <input type="hidden" id="appointmentType" value="Follow-up" />
        </div>

        <div class="field">
          <label for="visitDate">Visit Date</label>
          <input id="visitDate" type="date" />
        </div>

        <div class="field">
          <label for="visitTime">Visit Time</label>
          <input id="visitTime" type="time" />
        </div>

        <div class="field">
          <label for="patientName">Patient Name / Identifier</label>
          <input id="patientName" type="text" placeholder="Optional" />
        </div>

        <div class="field">
          <label for="clinicianName">Clinician</label>
          <input id="clinicianName" type="text" placeholder="Optional" />
        </div>
      </div>
    </section>

    <section class="workspace-shell" id="workspaceShell">
      <div class="workspace-main" id="workspaceMain">
        <section class="card notes-card" id="notesCard">
          <div class="section-header">
            <h2>Appointment Notes</h2>
          </div>

          <div class="form-grid">
            <div class="field" id="priorPlanField">
              <label for="priorPlan">Prior Plan</label>
              <textarea id="priorPlan" rows="5" placeholder="Prior treatment plan / last visit plan"></textarea>
            </div>

            <div class="field">
              <label for="freeformNotes">Freeform Notes</label>
              <textarea id="freeformNotes" rows="14" placeholder="Raw visit notes, updates, symptoms, MSE details, med changes, rationale, risks, counseling, etc."></textarea>
            </div>
          </div>
        </section>
      </div>

      <aside class="workspace-side is-hidden" id="scriptWorkspace">
        <section class="card">
          <div class="section-header">
            <h2>Intake Script Workspace</h2>
            <button type="button" id="collapseScriptBtn" class="mini-btn">Collapse</button>
          </div>

          <div class="script-block">
            <div class="script-block-title">HPI / Context</div>
            <label class="checkline"><input type="checkbox" class="script-check" /> Chief concern clarified</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Symptom timeline reviewed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Functional impact assessed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Prior treatment history reviewed</label>
          </div>

          <div class="script-block">
            <div class="script-block-title">Psychiatric Review</div>
            <label class="checkline"><input type="checkbox" class="script-check" /> Mood symptoms reviewed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Anxiety symptoms reviewed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Attention / executive symptoms reviewed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Sleep / appetite / energy reviewed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Psychosis / mania screen reviewed</label>
          </div>

          <div class="script-block">
            <div class="script-block-title">Risk / Background</div>
            <label class="checkline"><input type="checkbox" class="script-check" /> SI / HI / self-harm assessed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Substance use reviewed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Trauma / psychosocial background reviewed</label>
            <label class="checkline"><input type="checkbox" class="script-check" /> Medical history / meds reviewed</label>
          </div>
        </section>
      </aside>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Follow-up Scheduling</h2>
      </div>

      <div class="followup-toolbar">
        <div class="quick-buttons">
          <button type="button" class="quick-followup-btn" data-weeks="1">1 wk</button>
          <button type="button" class="quick-followup-btn" data-weeks="2">2 wk</button>
          <button type="button" class="quick-followup-btn" data-weeks="3">3 wk</button>
          <button type="button" class="quick-followup-btn" data-weeks="4">4 wk</button>
          <button type="button" class="quick-followup-btn" data-weeks="6">6 wk</button>
          <button type="button" class="quick-followup-btn" data-weeks="8">8 wk</button>
          <button type="button" class="quick-followup-btn" data-weeks="12">12 wk</button>
          <button type="button" id="prnBtn" class="quick-followup-btn prn-btn">PRN</button>
        </div>

        <div class="form-grid form-grid-2 followup-fields" id="followupFields">
          <div class="field">
            <label for="followupDate">Follow-up Date</label>
            <input id="followupDate" type="date" />
          </div>

          <div class="field">
            <label for="followupTime">Follow-up Time</label>
            <input id="followupTime" type="time" />
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Export Preview</h2>
      </div>

      <div class="field">
        <label for="gptUrl">GPT URL</label>
        <input
          id="gptUrl"
          type="url"
          placeholder="Paste your GPT link here"
        />
      </div>

      <div class="export-panel" id="exportPreview" aria-live="polite"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
